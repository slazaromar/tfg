name: CI — Backend

on:
  push:
    branches: [dev, main]
    paths:   [backend/**]
  pull_request:
    branches: [dev, main]
    paths:   [backend/**]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       lineupai_test
          POSTGRES_USER:     lineupai_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --coverage --forceExit
        env:
          NODE_ENV:       test
          DB_HOST:        localhost
          DB_PORT:        5432
          DB_NAME:        lineupai_test
          DB_USER:        lineupai_user
          DB_PASSWORD:    test_password
          REDIS_HOST:     localhost
          REDIS_PORT:     6379
          JWT_SECRET:     test_jwt_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          RECOMMENDATION_API_KEY: test_api_key

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lineupai-backend:${{ github.sha }} --target production .
        working-directory: backend
