name: CI — Recommendation Engine

on:
  push:
    branches: [dev, main]
    paths:   [recommendation-engine/**]
  pull_request:
    branches: [dev, main]
    paths:   [recommendation-engine/**]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recommendation-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: recommendation-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff linter
        run: pip install ruff && ruff check app/ tests/ --ignore E501 || true

      - name: Run pytest
        run: pytest --tb=short --cov=app --cov-report=xml
        env:
          INTERNAL_API_KEY: test_api_key

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: recommendation-engine/coverage.xml

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lineupai-recommendation:${{ github.sha }} .
        working-directory: recommendation-engine
